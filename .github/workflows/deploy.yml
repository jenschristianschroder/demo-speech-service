name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: speech-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ─── Ensure resource group exists ──────────────────────────────────
      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      # ─── Deploy infrastructure (creates ACR if needed) ───────────────
      - name: Deploy Bicep (infra only — placeholder images)
        uses: azure/arm-deploy@v2
        id: infra
        with:
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            imageTag=${{ github.sha }}
            ${{ secrets.AZURE_SPEECH_REGION != '' && format('speechRegion={0}', secrets.AZURE_SPEECH_REGION) || '' }}
            ${{ secrets.AZURE_SPEECH_RESOURCE_ID != '' && format('speechResourceId={0}', secrets.AZURE_SPEECH_RESOURCE_ID) || '' }}
          failOnStdErr: false

      # ─── Build & push container images ───────────────────────────────
      - name: ACR Login
        run: az acr login --name $(echo "${{ steps.infra.outputs.acrLoginServer }}" | cut -d. -f1)

      - name: Build & push API image
        run: |
          docker build -t ${{ steps.infra.outputs.acrLoginServer }}/${{ env.APP_NAME }}-api:${{ github.sha }} ./services/api
          docker push ${{ steps.infra.outputs.acrLoginServer }}/${{ env.APP_NAME }}-api:${{ github.sha }}

      - name: Build & push SPA image
        run: |
          docker build -t ${{ steps.infra.outputs.acrLoginServer }}/${{ env.APP_NAME }}-spa:${{ github.sha }} .
          docker push ${{ steps.infra.outputs.acrLoginServer }}/${{ env.APP_NAME }}-spa:${{ github.sha }}

      # ─── Update container apps with new images ──────────────────────
      - name: Update API Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }}-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.infra.outputs.acrLoginServer }}/${{ env.APP_NAME }}-api:${{ github.sha }}

      - name: Update SPA Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }}-spa \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.infra.outputs.acrLoginServer }}/${{ env.APP_NAME }}-spa:${{ github.sha }}

      - name: Output SPA URL
        run: echo "🚀 SPA deployed to ${{ steps.infra.outputs.spaUrl }}"
